<div class="card">
  <img [src]="getAllImages(product())[getIndex(product().id)]" [alt]="product().name" class="img">

  <div class="thumbs">
    @for (img of getAllImages(product()); track $index) {
      <img
        class="thumb"
        [class.active]="$index === getIndex(product().id)"
        [src]="img"
        [alt]="product().name + ' thumbnail ' + ($index + 1)"
        (click)="setIndex(product().id, $index)">
    }
  </div>

  <div class="nav">
    <button class="nav-btn" (click)="prevImage(product().id, getAllImages(product()).length)">←</button>
    <button class="nav-btn" (click)="nextImage(product().id, getAllImages(product()).length)">→</button>
  </div>

  <h3 class="name">{{ product().name }}</h3>

  <p class="fandom-line">
    <span class="fandom-label">Fandom: </span>
    <span class="fandom-value">{{ product().fandom || 'General' }}</span>
  </p>

  <p class="desc">{{ product().description }}</p>

  <p class="price">
    <span class="price-label">Price: </span>
    <span class="price-value">{{ product().price | number }} ₸</span>
  </p>

  <p class="pickup-line">
    <span class="pickup-label">Delivery: </span>
    <span class="pickup-value">Pickup</span>
  </p>

  <p class="rating">Rating: {{ product().rating }} ⭐</p>

  <div class="like-row" (click)="onLikeClick()">
    <span class="heart" [class.liked]="product().isLiked">♥</span>
    <span class="like-count">{{ product().likes }}</span>
  </div>

  <a class="link" [href]="product().link" target="_blank">Open on Ozon</a>

<button
  class="favorite-btn under-link"
  [class.favorite-active]="product().isFavorite"
  (click)="onFavoriteClick()">
  {{ product().isFavorite ? '★ Favorite' : '☆ Favorite' }}
</button>

  <div class="share-row">
    <button class="share-btn" (click)="shareOnWhatsApp(product().link)">Share on WhatsApp</button>
    <button class="share-btn" (click)="shareOnTelegram(product().link, product().name)">Share on Telegram</button>
  </div>

  <button (click)="onDeleteClick()" class="delete">Delete</button>
</div>
